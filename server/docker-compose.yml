# From this directory: docker compose up
# Service listens on PORT (default 8787). Same as: npm run persist
services:
  persist_sync:
    image: node:20-bookworm-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8787:8787"
    environment:
      PORT: "8787"
    command: ["node", "tools/persist_sync.cjs"]
